<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">

  <!-- Background -->
  <rect width="1200" height="630" fill="#fff"/>

  <!-- Grid column decoration — right half, muted -->
  <rect x="760"  y="0" width="100" height="630" fill="#f7f7f7"/>
  <rect x="876"  y="0" width="100" height="630" fill="#f7f7f7"/>
  <rect x="992"  y="0" width="100" height="630" fill="#f7f7f7"/>
  <rect x="1108" y="0" width="92"  height="630" fill="#ff115c" opacity=".06"/>

  <!-- Left vertical accent line -->
  <rect x="48" y="80" width="3" height="470" fill="#ff115c"/>

  <!-- Eyebrow -->
  <text x="72" y="152"
        font-family="'Arial Narrow', 'Helvetica Neue Condensed', sans-serif"
        font-size="18" font-weight="700" letter-spacing="6"
        fill="#a4a4a4">DESIGN SYSTEM</text>

  <!-- Main title: "UI" black, "KIT" red -->
  <text x="68" y="310"
        font-family="'Arial Narrow', 'Helvetica Neue Condensed', sans-serif"
        font-size="188" font-weight="700" font-style="italic"
        letter-spacing="-6" fill="#000">UI</text>
  <text x="326" y="310"
        font-family="'Arial Narrow', 'Helvetica Neue Condensed', sans-serif"
        font-size="188" font-weight="700" font-style="italic"
        letter-spacing="-6" fill="#ff115c">KIT</text>

  <!-- Subline -->
  <text x="72" y="372"
        font-family="'Arial Narrow', 'Helvetica Neue Condensed', sans-serif"
        font-size="24" fill="#535353" letter-spacing="1">
    Light theme · Sharp corners · Roboto Condensed · Based on owo
  </text>

  <!-- Divider -->
  <rect x="72" y="420" width="600" height="1" fill="#e0e0e0"/>

  <!-- Domain -->
  <text x="72" y="460"
        font-family="monospace, 'Courier New'"
        font-size="19" fill="#a4a4a4" letter-spacing="0">
    iwwwanow.github.io/ui-kit
  </text>

  <!-- ── Component mini-preview (right column area) ── -->

  <!-- Buttons row -->
  <rect x="796" y="90" width="130" height="32" fill="#ff115c"/>
  <text x="861" y="111" text-anchor="middle"
        font-family="sans-serif" font-size="12" font-weight="700"
        letter-spacing="2" fill="#fff">PRIMARY</text>

  <rect x="940" y="90" width="130" height="32" fill="none" stroke="#e0e0e0" stroke-width="1"/>
  <text x="1005" y="111" text-anchor="middle"
        font-family="sans-serif" font-size="12" font-weight="700"
        letter-spacing="2" fill="#535353">DEFAULT</text>

  <!-- Input -->
  <rect x="796" y="146" width="274" height="32" fill="none" stroke="#e0e0e0" stroke-width="1"/>
  <text x="810" y="167"
        font-family="sans-serif" font-size="14" fill="#a4a4a4">Placeholder text…</text>

  <!-- Card -->
  <rect x="796" y="202" width="274" height="130" fill="none" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="796" y="202" width="274" height="36" fill="none" stroke="#e0e0e0" stroke-width="1"/>
  <text x="812" y="225"
        font-family="sans-serif" font-size="13" font-weight="700" fill="#000">Card title</text>
  <rect x="812" y="256" width="180" height="8" fill="#f0f0f0"/>
  <rect x="812" y="272" width="230" height="8" fill="#f0f0f0"/>
  <rect x="812" y="288" width="150" height="8" fill="#f0f0f0"/>
  <!-- card footer -->
  <rect x="796" y="296" width="274" height="36" fill="#f7f7f7" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="812" y="307" width="72" height="14" fill="#ff115c"/>
  <rect x="892" y="307" width="60" height="14" fill="none" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Badges row -->
  <rect x="796" y="356" width="76" height="22" fill="none" stroke="#ff115c" stroke-width="1"/>
  <text x="834" y="371" text-anchor="middle"
        font-family="sans-serif" font-size="11" font-weight="700"
        letter-spacing="1" fill="#ff115c">ACCENT</text>

  <rect x="884" y="356" width="76" height="22" fill="none" stroke="#e0e0e0" stroke-width="1"/>
  <text x="922" y="371" text-anchor="middle"
        font-family="sans-serif" font-size="11" font-weight="700"
        letter-spacing="1" fill="#535353">DEFAULT</text>

  <rect x="972" y="356" width="76" height="22" fill="none" stroke="#009bff" stroke-width="1"/>
  <text x="1010" y="371" text-anchor="middle"
        font-family="sans-serif" font-size="11" font-weight="700"
        letter-spacing="1" fill="#009bff">INFO</text>

  <!-- Progress bar -->
  <rect x="796" y="402" width="274" height="4" fill="#e0e0e0"/>
  <rect x="796" y="402" width="183" height="4" fill="#ff115c"/>

  <!-- Toggle -->
  <rect x="796" y="426" width="40" height="22" fill="#ff115c"/>
  <rect x="820" y="429" width="14" height="14" fill="#fff" rx="0"/>

  <rect x="852" y="426" width="40" height="22" fill="#e0e0e0"/>
  <rect x="856" y="429" width="14" height="14" fill="#a4a4a4" rx="0"/>

  <!-- Checkbox -->
  <rect x="908" y="426" width="18" height="18" fill="#ff115c"/>
  <polyline points="912,435 916,440 922,430" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="940" y="426" width="18" height="18" fill="none" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Divider rule -->
  <rect x="796" y="468" width="274" height="1" fill="#e0e0e0"/>
  <text x="796" y="490"
        font-family="sans-serif" font-size="11" font-weight="700"
        letter-spacing="3" fill="#a4a4a4">OR CONTINUE</text>

  <!-- Media card sketch -->
  <rect x="796" y="510" width="83" height="100" fill="#e0e0e0"/>
  <rect x="796" y="582" width="83" height="28" fill="#000" opacity=".18"/>
  <text x="800" y="598"
        font-family="sans-serif" font-size="10" font-weight="700" fill="#535353">Title</text>

  <rect x="891" y="510" width="83" height="100" fill="#ff115c" opacity=".12" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="987" y="510" width="83" height="100" fill="#e0e0e0" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Bottom border -->
  <rect y="626" width="1200" height="4" fill="#ff115c"/>

</svg>
